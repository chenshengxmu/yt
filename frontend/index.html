<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.27 8.27 0 0 0 4.84 1.56V6.8a4.85 4.85 0 0 1-1.07-.11z"/>
    </svg>
    YT Downloader
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search videos..." autocomplete="off" />
  </div>
</header>

<main>
  <!-- Download bar -->
  <div class="download-bar">
    <input type="text" id="url-input" placeholder="Paste a YouTube URL..." autocomplete="off" />
    <button class="btn" id="download-btn">Download</button>
  </div>

  <!-- Active downloads -->
  <section id="active-section" style="display:none">
    <div class="section-title">Downloading</div>
    <div id="active-list"></div>
  </section>

  <!-- Video library -->
  <section id="library-section">
    <div class="section-title">Library</div>
    <div id="video-grid" class="grid"></div>
  </section>
</main>

<!-- Player modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <video id="player" controls preload="metadata"></video>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
